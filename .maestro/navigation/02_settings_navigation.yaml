appId: com.eugenechan.Noto
name: "Navigate to settings and back"
tags:
  - navigation
---
- runFlow: ../common/prep_testing_environment.yaml

# Tap settings
- tapOn:
    id: "settings_button"

# Verify settings screen
- assertVisible: "Settings"
- assertVisible: "Vault Location"

# Go back
- tapOn:
    id: "back_button"

# Verify we're back at note list
- assertVisible:
    id: "note_list"
