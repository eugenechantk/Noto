appId: com.eugenechan.Noto
name: "Create and navigate into a folder"
tags:
  - navigation
---
- runFlow: ../common/setup_vault_with_content.yaml

# "Projects" folder was created by setup — navigate into it
- tapOn: "Projects"

# The folder should be empty (no notes created inside it)
- assertVisible: "Empty"

# Go back
- runFlow: ../common/go_back.yaml

# Verify we're back at root with both folders
- assertVisible: "Projects"
- assertVisible: "Archive"
