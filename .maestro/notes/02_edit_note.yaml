appId: com.eugenechan.Noto
name: "Open and edit an existing note"
tags:
  - notes
---
- runFlow: ../common/setup_vault_with_content.yaml
# Setup already created notes — verify they exist
- assertVisible: "Meeting Notes"
- assertVisible: "Shopping List"
# Create an additional note
- runFlow: ../common/create_note.yaml
- inputText: "Extra Note"
- stopApp
- launchApp
# All notes should appear
- extendedWaitUntil:
    visible: "Meeting Notes"
    timeout: 5000
- assertVisible: "Extra Note"
