appId: com.eugenechan.Noto
name: "Type markdown heading and verify persistence"
tags:
  - notes
  - editor
---
- runFlow: ../common/setup_vault_with_content.yaml
- runFlow: ../common/create_note.yaml
# Type a heading - becomes the note title
- inputText: "Test Heading"
# Verify nav title updated immediately
- assertVisible: "Test Heading"
# Relaunch to verify persistence
- stopApp
- launchApp
- extendedWaitUntil:
    visible: "Test Heading"
    timeout: 5000
