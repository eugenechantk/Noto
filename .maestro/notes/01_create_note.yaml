appId: com.eugenechan.Noto
name: "Create a new note and verify it persists"
tags:
  - smoke
  - notes
---
- runFlow: ../common/prep_testing_environment.yaml

# Create a new note
- tapOn:
    id: "add_menu"
- tapOn: "New Note"
- tapOn:
    id: "note_editor"
- inputText: "Shopping List Extra"

# Navigate back to save
- tapOn:
    id: "back_button"
- extendedWaitUntil:
    visible:
      id: "note_list"
    timeout: 5000

# Note should appear in list
- assertVisible: "Shopping List Extra"
