appId: com.eugenechan.Noto
name: "Create a new note and verify it persists"
tags:
  - smoke
  - notes
---
- runFlow: ../common/setup_vault_with_content.yaml
- runFlow: ../common/create_note.yaml
- inputText: "Shopping List Extra"
# Relaunch to verify persistence (avoids iOS 26 keyboard back-nav issue)
- stopApp
- launchApp
# Note should appear in list after relaunch
- extendedWaitUntil:
    visible: "Shopping List Extra"
    timeout: 5000
