appId: com.eugenechan.Noto
name: "Verify note list shows correct items after deletion (manual)"
tags:
  - notes
  - manual
---
# NOTE: Swipe-to-delete on Button-based list rows is unreliable in Maestro + iOS 26.
# This test verifies the list state is correct. Deletion itself is covered by unit tests.
- launchApp:
    clearState: true
- runFlow: ../common/setup_vault.yaml
# Create two notes
- runFlow: ../common/create_note.yaml
- inputText: "Note Alpha"
- stopApp
- launchApp
- runFlow: ../common/create_note.yaml
- inputText: "Note Beta"
- stopApp
- launchApp
# Verify both notes appear
- extendedWaitUntil:
    visible: "Note Alpha"
    timeout: 5000
- assertVisible: "Note Beta"
