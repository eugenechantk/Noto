appId: com.eugenechan.Noto
name: "Open today's note"
tags:
  - daily
---
- runFlow: ../common/setup_vault_with_content.yaml
# Tap today button
- tapOn:
    id: "today_button"
# Verify editor opens
- assertVisible:
    id: "note_editor"
# Relaunch to verify Daily Notes folder was created
- stopApp
- launchApp
- assertVisible: "Daily Notes"
